<!-- @dsCard group="Pocket Cards" viewport="430x920" name="App Cultiva · Cosecha (N1–N4 + Escaladas)" subtitle="Multiárea data-driven · selector área→perfil · galería · detalle · bandeja de escaladas" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>App Cultiva · Cosecha</title>

<!-- PWA -->
<meta name="theme-color" content="#0B3A66">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cultiva">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">

<link rel="stylesheet" href="assets/styles.css">
<style>
  :root { --navy: #0B3A66; --blue: var(--cultiva-blue); }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: #0B2540;
    font-family: var(--font-sans);
    color: var(--ink-900);
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh;
  }

  /* ---------------- device shell ---------------- */
  .device {
    width: 100%; max-width: 430px;
    height: 100vh; max-height: 980px;
    background: var(--paper-off);
    display: flex; flex-direction: column;
    overflow: hidden; position: relative;
    box-shadow: 0 24px 70px rgba(0,0,0,0.45);
  }
  @media (min-width: 470px) { .device { margin: 24px 0; border-radius: 30px; height: calc(100vh - 48px); } }
  #root { flex: 1; min-height: 0; display: flex; }
  .app { flex: 1; min-height: 0; display: flex; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .app::-webkit-scrollbar { width: 0; }
  .screen { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ================= START SCREEN ================= */
  .start {
    background: linear-gradient(170deg, #0B3A66 0%, var(--cultiva-blue) 58%, #3a4d92 100%);
    color: #fff; padding: 26px 22px 30px; gap: 0;
  }
  .start-brand { display: flex; align-items: center; gap: 12px; }
  .start-logo { width: 46px; height: 46px; border-radius: 12px; background: #fff; flex: none;
    display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(0,0,0,0.25); }
  .start-logo img { width: 36px; height: 36px; object-fit: contain; }
  .start-kicker { font-family: var(--font-display); font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.05em; font-size: 15px; white-space: nowrap; line-height: 1.1; }
  .start-prog { font-size: 12px; color: rgba(255,255,255,0.78); margin-top: 1px; }

  .start-steps { display: flex; align-items: center; gap: 7px; margin: 30px 0 22px; }
  .stepdot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: all .2s; }
  .stepdot.on { background: var(--cultiva-gold); box-shadow: 0 0 0 4px rgba(230,184,74,0.22); }
  .stepline { flex: 1; height: 2px; background: rgba(255,255,255,0.22); border-radius: 2px; transition: all .2s; }
  .stepline.on { background: var(--cultiva-gold); }

  .start-body { display: flex; flex-direction: column; flex: 1; animation: fade .3s ease; }
  .start-q { font-family: var(--font-display); font-weight: 800; font-size: 27px; line-height: 1.06;
    margin: 0; letter-spacing: -0.01em; text-wrap: balance; }
  .start-hint { font-size: 13.5px; color: rgba(255,255,255,0.8); margin: 9px 0 22px; line-height: 1.4; }

  .area-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
  .area-card { position: relative; display: flex; flex-direction: column; align-items: flex-start; gap: 13px;
    padding: 18px 16px; border-radius: 18px; cursor: pointer; text-align: left;
    background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.22);
    color: #fff; font-family: var(--font-display); transition: all .16s ease; backdrop-filter: blur(2px); }
  .area-card:not(.soon):hover { background: #fff; color: var(--cultiva-blue); transform: translateY(-2px); }
  .area-card:not(.soon):hover .area-ico { background: color-mix(in srgb, var(--cultiva-blue) 12%, #fff); }
  .area-ico { width: 46px; height: 46px; border-radius: 13px; display: flex; align-items: center;
    justify-content: center; background: rgba(255,255,255,0.18); }
  .area-ico i { width: 24px; height: 24px; }
  .area-name { font-weight: 800; font-size: 16px; text-transform: uppercase; letter-spacing: 0.01em; }
  .area-card.soon { opacity: 0.5; cursor: not-allowed; }
  .soon-tag { font-family: var(--font-sans); font-weight: 700; font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.05em; background: rgba(255,255,255,0.2); padding: 3px 8px; border-radius: 999px; }

  .back-link { align-self: flex-start; display: inline-flex; align-items: center; gap: 4px; cursor: pointer;
    background: none; border: none; color: rgba(255,255,255,0.85); font-family: var(--font-sans);
    font-weight: 600; font-size: 12.5px; padding: 0; margin-bottom: 14px; }
  .start-area-pill { display: inline-flex; align-items: center; gap: 6px; align-self: flex-start;
    background: rgba(255,255,255,0.16); padding: 5px 13px 5px 11px; border-radius: 999px;
    font-family: var(--font-display); font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.03em; font-size: 11.5px; margin-bottom: 16px; }
  .puesto-list { display: flex; flex-direction: column; gap: 11px; }
  .puesto-card { display: flex; align-items: center; gap: 14px; padding: 15px 16px; border-radius: 18px;
    cursor: pointer; background: #fff; border: none; color: var(--navy); text-align: left;
    box-shadow: 0 8px 22px rgba(0,0,0,0.18); transition: transform .16s ease; }
  .puesto-card:hover { transform: translateY(-2px); }
  .puesto-card > i:last-child { margin-left: auto; color: var(--cultiva-blue); flex: none; }
  .puesto-ico { width: 46px; height: 46px; border-radius: 14px; flex: none; display: flex;
    align-items: center; justify-content: center; color: #fff; position: relative;
    background: linear-gradient(140deg, var(--cultiva-blue), #0B3A66); }
  .puesto-lvl { position: absolute; bottom: -5px; right: -5px; background: var(--cultiva-gold);
    color: #3a2e08; font-family: var(--font-display); font-weight: 800; font-size: 10px;
    padding: 1px 6px; border-radius: 999px; border: 2px solid #fff; }
  .puesto-ico i { width: 24px; height: 24px; }
  .puesto-txt { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; }
  .puesto-name { font-family: var(--font-display); font-weight: 800; font-size: 15.5px;
    text-transform: uppercase; letter-spacing: 0.005em; line-height: 1.12; text-wrap: balance; }
  .puesto-sub { font-size: 12px; color: var(--ink-500); font-style: italic; }

  /* ============= LOGIN ============= */
  .login { justify-content: flex-start; }
  .login-body { display: flex; flex-direction: column; flex: 1; justify-content: center; animation: fade .3s ease; }
  .login-card { display: flex; flex-direction: column; gap: 10px; }
  .login-q { font-family: var(--font-display); font-weight: 800; font-size: 26px; line-height: 1.08;
    margin: 0; letter-spacing: -0.01em; }
  .login-hint { font-size: 13.5px; color: rgba(255,255,255,0.8); margin: 2px 0 12px; line-height: 1.4; }
  .login-l { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
    color: rgba(255,255,255,0.72); margin-top: 4px; }
  .login-input { width: 100%; padding: 13px 15px; border-radius: 13px; border: 1.5px solid rgba(255,255,255,0.28);
    background: rgba(255,255,255,0.12); color: #fff; font-family: var(--font-sans); font-size: 15px;
    -webkit-appearance: none; }
  .login-input::placeholder { color: rgba(255,255,255,0.5); }
  .login-input:focus { outline: none; border-color: var(--cultiva-gold);
    box-shadow: 0 0 0 3px rgba(230,184,74,0.25); background: rgba(255,255,255,0.16); }
  .login-btn { margin-top: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    height: 52px; border-radius: 999px; cursor: pointer; border: none; background: var(--cultiva-gold);
    color: #3a2e08; font-family: var(--font-display); font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.03em; font-size: 14px; transition: filter .15s, transform .1s; }
  .login-btn:hover { filter: brightness(1.04); }
  .login-btn:active { transform: scale(0.985); }
  .login-maestro-btn { margin-top: 12px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; height: 46px; border-radius: 999px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.10);
    color: #fff; font-family: var(--font-display); font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.03em; font-size: 13px; }
  .login-maestro-btn:hover { background: rgba(255,255,255,0.18); }
  /* inputs del modo maestro (pantalla clara → texto oscuro) */
  .mtr-input { width: 100%; box-sizing: border-box; height: 48px; padding: 0 14px; border-radius: 12px;
    border: 1px solid var(--ink-200, #d8cdbb); background: #fff; color: var(--ink-900, #23201c);
    font-size: 15px; font-family: var(--font-sans); }
  .mtr-input::placeholder { color: #b8a894; }
  .mtr-input:focus { outline: none; border-color: var(--cultiva-gold, #D9A521); }
  .login-err { display: flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 600;
    color: #FFD9C7; background: rgba(168,21,25,0.32); border: 1px solid rgba(255,150,130,0.4);
    padding: 9px 12px; border-radius: 11px; }
  .login-back { align-self: flex-start; display: inline-flex; align-items: center; gap: 4px; cursor: pointer;
    background: none; border: none; color: rgba(255,255,255,0.85); font-family: var(--font-sans);
    font-weight: 600; font-size: 12.5px; padding: 0; margin-bottom: 8px; }
  .login-user { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 14px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18); margin-bottom: 6px; }
  .login-avatar { width: 42px; height: 42px; border-radius: 12px; flex: none; display: flex;
    align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 800;
    font-size: 18px; color: #3a2e08; background: var(--cultiva-gold); }
  .login-user-name { font-family: var(--font-display); font-weight: 800; font-size: 15px; line-height: 1.1; }
  .login-user-role { font-size: 11.5px; color: rgba(255,255,255,0.72); margin-top: 2px; }
  .login-review { margin-top: auto; padding-top: 20px; display: flex; flex-direction: column; gap: 4px;
    position: relative; }
  .login-review-btn { display: inline-flex; align-items: center; gap: 7px; align-self: flex-start; cursor: pointer;
    background: rgba(255,255,255,0.1); border: 1px dashed rgba(255,255,255,0.4); border-radius: 999px;
    padding: 9px 15px; color: #fff; font-family: var(--font-display); font-weight: 700; font-size: 12.5px; }
  .login-review-btn:hover { background: rgba(255,255,255,0.18); }
  .login-review-star { position: absolute; left: -2px; top: 14px; color: var(--cultiva-gold); font-weight: 800; }
  .login-review-note { font-size: 11px; color: rgba(255,255,255,0.6); line-height: 1.35; padding-left: 2px; }

  /* banner de acceso de revisión (sobre el selector de área) */
  .review-banner { display: flex; align-items: center; gap: 9px; margin-bottom: 16px; padding: 10px 13px;
    border-radius: 13px; background: rgba(230,184,74,0.16); border: 1px dashed rgba(230,184,74,0.6);
    font-size: 12px; line-height: 1.35; color: #fff; }
  .review-banner > i { color: var(--cultiva-gold); flex: none; }
  .review-banner b { font-weight: 800; }
  .review-exit { margin-left: auto; flex: none; cursor: pointer; background: rgba(255,255,255,0.16);
    border: none; border-radius: 999px; padding: 5px 12px; color: #fff; font-family: var(--font-sans);
    font-weight: 700; font-size: 11px; }
  .review-exit:hover { background: rgba(255,255,255,0.26); }
  .gallery-hi { font-size: 13px; color: var(--cultiva-blue); font-weight: 700; margin: 0 0 2px; }

  /* ================= TOPBAR ================= */
  .topbar { flex: none; display: flex; align-items: center; gap: 12px; padding: 13px 16px;
    background: #fff; border-bottom: 1px solid var(--ink-100); }
  .icon-btn { width: 38px; height: 38px; border-radius: 11px; flex: none; cursor: pointer;
    border: 1px solid var(--ink-200); background: var(--paper); color: var(--navy);
    display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .icon-btn:hover { background: var(--paper-off); }
  .icon-btn i { width: 19px; height: 19px; }
  .icon-btn-sm { width: 30px; height: 30px; border-radius: 9px; }
  .icon-btn-sm i { width: 15px; height: 15px; }
  .topbar-role-sm { font-size: 12.5px; }
  .topbar-pts { margin-left: auto; flex: none; display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; color: var(--ink-600, #4a544e); background: var(--paper-sunken);
    border: 1px solid var(--ink-200); border-radius: 999px; padding: 5px 11px; white-space: nowrap;
    cursor: pointer; font-family: inherit; }
  .topbar-pts:hover { background: var(--paper-off); }
  .topbar-pts b { color: var(--navy); }
  /* panel de puntos (overlay desde el chip) */
  .pts-overlay { position: fixed; inset: 0; z-index: 60; background: rgba(15,30,45,0.45);
    display: flex; align-items: flex-start; justify-content: center; padding: 20px 16px;
    animation: fade .15s ease; }
  .pts-modal { background: #fff; width: 100%; max-width: 400px; max-height: 88%; overflow-y: auto;
    border-radius: 16px; padding: 16px 18px; box-shadow: 0 20px 60px rgba(0,0,0,0.35); margin-top: 8vh; }
  .pts-modal-h { display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; color: #5a4a38; }
  .pts-close { background: none; border: none; cursor: pointer; color: var(--ink-500,#8a7a68);
    display: flex; padding: 4px; margin: -4px; }
  .topbar-id { display: flex; flex-direction: column; gap: 2px; line-height: 1.1; min-width: 0; }
  .topbar-role { font-family: var(--font-display); font-weight: 800; font-size: 15px;
    text-transform: uppercase; letter-spacing: 0.005em; color: var(--navy); white-space: nowrap;
    line-height: 1.05; overflow: hidden; text-overflow: ellipsis; }
  .topbar-area { display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
    color: var(--ink-500); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
  .topbar-lvl { background: var(--paper-sunken); color: var(--ink-600,#4a544e); border-radius: 999px;
    padding: 1px 7px; font-weight: 800; font-size: 10px; margin-left: 2px; }
  .detail-dim { margin-left: auto; display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-display); font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.06em; font-size: 12px; }

  /* ================= GALLERY ================= */
  .gallery { display: flex; flex-direction: column; overflow-y: auto; padding: 0 0 20px; }
  .gallery-head { padding: 20px 18px 4px; }
  .gallery-title { font-family: var(--font-display); font-weight: 800; font-size: 26px; margin: 0;
    color: var(--ink-900); letter-spacing: -0.01em; }
  .gallery-sub { font-size: 13px; color: var(--ink-500); margin: 5px 0 0; }

  .dim-group { padding: 18px 18px 0; }
  .dim-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .dim-head .dim-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--dc); }
  .dim-label { font-family: var(--font-display); font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.08em; font-size: 12px; color: var(--dc); }
  .dim-count { font-size: 10px; font-weight: 700; color: var(--ink-400); background: var(--ink-100);
    border-radius: 999px; padding: 2px 8px; }

  .thumb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
  .thumb { position: relative; display: flex; flex-direction: column; gap: 11px; padding: 16px;
    border-radius: 18px; cursor: pointer; text-align: left; background: #fff;
    border: 1px solid var(--ink-100); border-top: 4px solid var(--dc);
    box-shadow: 0 4px 16px rgba(11,37,64,0.06); transition: all .16s ease; min-height: 132px; }
  .thumb:hover { transform: translateY(-3px); box-shadow: 0 10px 26px rgba(11,37,64,0.13); }
  .thumb-top { display: flex; align-items: flex-start; justify-content: space-between; }
  .thumb-ico { width: 44px; height: 44px; border-radius: 13px; display: flex; align-items: center;
    justify-content: center; color: var(--dc); background: color-mix(in srgb, var(--dc) 12%, #fff); }
  .thumb-ico i { width: 23px; height: 23px; }
  .thumb-name { font-family: var(--font-display); font-weight: 700; font-size: 16px; line-height: 1.1;
    color: var(--ink-900); margin-top: auto; text-wrap: balance; }
  .thumb-freq { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600;
    color: var(--ink-500); }
  .thumb-freq i { color: var(--dc); }

  /* maestro: galería compacta y solo-lectura (no clickable) */
  .mtr-rit .dim-group { padding: 12px 0 0; }
  .mtr-rit .dim-head { margin-bottom: 8px; }
  .mtr-rit .thumb-grid { gap: 9px; }
  .mtr-rit .thumb { padding: 11px; min-height: 90px; gap: 7px; border-radius: 14px;
    border-top-width: 3px; cursor: default; }
  .mtr-rit .thumb:hover { transform: none; box-shadow: 0 4px 16px rgba(11,37,64,0.06); }
  .mtr-rit .thumb-ico { width: 34px; height: 34px; border-radius: 10px; }
  .mtr-rit .thumb-ico i { width: 18px; height: 18px; }
  .mtr-rit .thumb-name { font-size: 13px; }
  .mtr-rit .thumb-freq { font-size: 10px; }
  /* estrella de favorito marcada: se rellena entera (no solo el borde) */
  .mtr-fav-on svg { fill: currentColor; }

  /* day strips (light rituals — informational, not clickable) */
  .day-strip { display: flex; align-items: center; gap: 13px; margin: 0 18px; padding: 15px 16px;
    border-radius: 15px; background: color-mix(in srgb, var(--dc) 10%, var(--paper));
    border: 2.5px solid color-mix(in srgb, var(--dc) 48%, transparent);
    box-shadow: 0 2px 10px color-mix(in srgb, var(--dc) 16%, transparent); }
  .day-strip.slim { margin-top: 14px; margin-bottom: 2px; padding: 11px 15px; gap: 12px; }
  .day-strip.foot { margin-top: 16px; }
  .day-strip .ds-ico { width: 34px; height: 34px; border-radius: 10px; flex: none; display: flex;
    align-items: center; justify-content: center; color: var(--dc);
    background: color-mix(in srgb, var(--dc) 15%, #fff); }
  .day-strip .ds-ico i { width: 18px; height: 18px; }
  .ds-txt { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .ds-title { font-family: var(--font-display); font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.03em; font-size: 12px; color: var(--dc); }
  .ds-reminder { font-size: 12px; line-height: 1.3; color: var(--ink-700); text-wrap: pretty; }

  /* escaladas strip (clickable) */
  .esc-strip { display: flex; align-items: center; gap: 13px; margin: 16px 18px 0; padding: 14px 15px;
    border-radius: 15px; cursor: pointer; text-align: left; width: calc(100% - 36px);
    background: color-mix(in srgb, var(--esc) 9%, #fff);
    border: 1.5px solid color-mix(in srgb, var(--esc) 34%, transparent);
    transition: all .16s ease; --esc: #2F6E7A; }
  .esc-strip:hover { background: color-mix(in srgb, var(--esc) 14%, #fff); transform: translateY(-1px); }
  .esc-strip .ds-ico { width: 38px; height: 38px; border-radius: 11px; flex: none; display: flex;
    align-items: center; justify-content: center; color: #fff; background: var(--esc); }
  .esc-strip .ds-ico i { width: 20px; height: 20px; }
  .esc-strip .ds-title { color: var(--esc); }
  .esc-badge { margin-left: auto; flex: none; display: inline-flex; align-items: center; gap: 5px;
    background: var(--esc); color: #fff; border-radius: 999px; padding: 4px 10px;
    font-family: var(--font-display); font-weight: 800; font-size: 12px; }
  .esc-badge.zero { background: var(--ink-200); color: var(--ink-500); }
  .esc-chev { color: var(--esc); flex: none; }

  /* banner de seguimientos de hoy (pantalla principal) */
  .segs-banner { margin: 10px 18px 0; border-radius: 12px; border: 1px solid rgba(230,184,74,0.5);
    background: rgba(230,184,74,0.12); overflow: hidden; flex-shrink: 0; }
  .segs-h { display: flex; align-items: center; gap: 8px; width: 100%; padding: 11px 14px;
    border: none; background: none; cursor: pointer; font-family: var(--font-sans);
    font-size: 13px; color: #6b4e12; text-align: left; }
  .segs-h > i:first-child { color: var(--cultiva-gold-deep); flex: none; }
  .segs-h > i:last-child { margin-left: auto; flex: none; }
  .segs-list { display: flex; flex-direction: column; gap: 6px; padding: 0 12px 12px; }
  .segs-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 10px;
    background: var(--paper); border: 1px solid var(--ink-100); font-family: var(--font-sans);
    font-size: 12.5px; color: var(--ink-700); text-align: left; cursor: pointer; }
  .segs-item i { flex: none; color: var(--ink-500); }
  .segs-item.alert { border-color: #A81519; color: #A81519; }
  .segs-item.alert i { color: #A81519; }
  .segs-item.info { cursor: default; }

  /* ================= DETAIL ================= */

  .fld-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px 11px; }
